/game/result:
  post:
    summary: Record game result
    description: Registers a win or loss for a user.
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required:
              - username
              - won
            properties:
              username:
                type: string
                example: testuser
              won:
                type: boolean
                example: true
    responses:
      '200':
        description: Result recorded successfully
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  example: Result recorded
      '400':
        description: Invalid input
      '404':
        description: User not found
      '500':
        description: Database not initialized

  /ranking:
    get:
      summary: Get global ranking
      description: Returns all players sorted by wins descending.
      responses:
        '200':
          description: Ranking retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ranking:
                    type: array
                    items:
                      type: object
                      properties:
                        position:
                          type: integer
                          example: 1
                        username:
                          type: string
                          example: testuser
                        wins:
                          type: integer
                          example: 10
                        losses:
                          type: integer
                          example: 2
                        winRate:
                          type: integer
                          example: 83
        '500':
          description: Database not initialized