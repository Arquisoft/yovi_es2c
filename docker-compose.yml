services:
  users:
    build: ./users
    container_name: users
    image: ghcr.io/arquisoft/yovi_es2c-users:latest
    ports:
      - "3000:3000"
    environment:
      - DB_URI=${DB_URI}
      - DB_PASSWORD=${DB_PASSWORD}
      #- DB_URI=mongodb://mongodb:27017
      #- DB_PASSWORD=
    networks:
      - monitor-net

  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - monitor-net

  webapp:
    build:
      context: ./webapp
      args:
        - VITE_API_URL=http://{{ secrets.DEPLOY_HOST }}:3000
        - VITE_GAMEY_URL=http://{{ secrets.DEPLOY_HOST }}:4000
        #- VITE_API_URL=http://localhost:3000
        #- VITE_GAMEY_URL=http://localhost:4000
    container_name: webapp
    image: ghcr.io/arquisoft/yovi_es2c-webapp:latest
    ports:
      - "80:80"
    depends_on:
      - users
    networks:
      - monitor-net

  gamey:
    build: ./gamey
    container_name: gamey
    image: ghcr.io/arquisoft/yovi_es2c-gamey:latest
    ports:
      - "4000:4000"
    environment:
      - MONGODB_PASSWORD=${DB_PASSWORD}
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./users/monitoring/prometheus:/etc/prometheus
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "9091:3000"
    volumes:
      - ./users/monitoring/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge
